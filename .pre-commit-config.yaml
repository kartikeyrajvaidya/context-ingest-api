# Pre-commit hooks for ContextIngest API.
#
# Install once, in your dev environment:
#
#     pip install pre-commit
#     pre-commit install
#
# Then every `git commit` will auto-run these checks. CI runs the same set,
# so anything pre-commit catches locally also blocks merges.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
